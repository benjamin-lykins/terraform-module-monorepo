name: Terraform Module Tests

on:
  pull_request:
    paths:
      - "modules/**"
      - ".github/workflows/terraform-module-tests.yml"
  push:
    paths:
      - "modules/**"
      - ".github/workflows/terraform-module-tests.yml"
  workflow_dispatch:

jobs:
  detect-module-changes:
    name: Detect changed modules
    runs-on: ubuntu-latest
    outputs:
      modules_json: ${{ steps.build-matrix.outputs.modules_json }}
      has_changes: ${{ steps.build-matrix.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            random_pet_name:
              - "modules/random_pet_name/**"
            random_password:
              - "modules/random_password/**"
            random_integer:
              - "modules/random_integer/**"
            random_uuid:
              - "modules/random_uuid/**"
            random_shuffle:
              - "modules/random_shuffle/**"

      - name: Build matrix from changed modules
        id: build-matrix
        shell: bash
        run: |
          modules=()

          if [[ "${{ steps.filter.outputs.random_pet_name }}" == "true" ]]; then
            modules+=("random_pet_name")
          fi

          if [[ "${{ steps.filter.outputs.random_password }}" == "true" ]]; then
            modules+=("random_password")
          fi

          if [[ "${{ steps.filter.outputs.random_integer }}" == "true" ]]; then
            modules+=("random_integer")
          fi

          if [[ "${{ steps.filter.outputs.random_uuid }}" == "true" ]]; then
            modules+=("random_uuid")
          fi

          if [[ "${{ steps.filter.outputs.random_shuffle }}" == "true" ]]; then
            modules+=("random_shuffle")
          fi

          if [[ ${#modules[@]} -eq 0 ]]; then
            echo 'modules_json=[]' >> "$GITHUB_OUTPUT"
            echo 'has_changes=false' >> "$GITHUB_OUTPUT"
          else
            printf -v modules_json '%s\n' "$(printf '%s\n' "${modules[@]}" | jq -R . | jq -cs .)"
            echo "modules_json=${modules_json}" >> "$GITHUB_OUTPUT"
            echo 'has_changes=true' >> "$GITHUB_OUTPUT"
          fi

  test-modules:
    name: Test ${{ matrix.module }}
    runs-on: ubuntu-latest
    needs: detect-module-changes
    if: needs.detect-module-changes.outputs.has_changes == 'true'
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.detect-module-changes.outputs.modules_json) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform -chdir=modules/${{ matrix.module }} init -input=false

      - name: Terraform test
        run: terraform -chdir=modules/${{ matrix.module }} test
