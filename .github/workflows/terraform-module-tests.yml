name: Terraform Module Tests

on:
  pull_request:
    paths:
      - "modules/**"
      - ".github/workflows/terraform-module-tests.yml"
  push:
    paths:
      - "modules/**"
      - ".github/workflows/terraform-module-tests.yml"
  workflow_dispatch:

jobs:
  detect-module-changes:
    name: Detect changed modules
    runs-on: ubuntu-latest
    outputs:
      modules_json: ${{ steps.build-matrix.outputs.modules_json }}
      has_changes: ${{ steps.build-matrix.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate filters file
        shell: bash
        run: |
          find modules -mindepth 1 -maxdepth 1 -type d -exec basename {} \; | \
          while IFS= read -r m; do
            printf '%s:\n  - "modules/%s/**"\n' "$m" "$m"
          done > /tmp/module-filters.yml

      - name: Detect changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: /tmp/module-filters.yml

      - name: Build matrix from changed modules
        id: build-matrix
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            modules_json=$(find modules -mindepth 1 -maxdepth 1 -type d -exec basename {} \; | jq -R . | jq -cs .)
          else
            modules_json='${{ steps.filter.outputs.changes }}'
          fi

          if [[ "$modules_json" == "[]" ]]; then
            echo 'has_changes=false' >> "$GITHUB_OUTPUT"
          else
            echo 'has_changes=true' >> "$GITHUB_OUTPUT"
          fi
          echo "modules_json=${modules_json}" >> "$GITHUB_OUTPUT"

  test-modules:
    name: Test ${{ matrix.module }}
    runs-on: ubuntu-latest
    needs: detect-module-changes
    if: needs.detect-module-changes.outputs.has_changes == 'true'
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.detect-module-changes.outputs.modules_json) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform -chdir=modules/${{ matrix.module }} init -input=false

      - name: Terraform test
        run: terraform -chdir=modules/${{ matrix.module }} test
